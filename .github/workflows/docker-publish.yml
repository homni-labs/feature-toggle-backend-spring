name: Docker

on:
  push:
    branches:
      - '**'
    tags:
      - 'v*'

jobs:
  build-image:
    name: Build image
    runs-on: ubuntu-latest
    if: github.ref_type == 'branch'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false

  release:
    name: Release
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:${{ github.ref_name }}
            ${{ secrets.DOCKER_USERNAME }}/homni-feature-toggle:latest
