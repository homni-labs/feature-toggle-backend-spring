version: "3.9"

services:
  # ── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: ft-postgres
    environment:
      POSTGRES_DB: homni_feature_toggle
      POSTGRES_USER: homni
      POSTGRES_PASSWORD: homni
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U homni -d homni_feature_toggle"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Keycloak ───────────────────────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: ft-keycloak
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/feature-toggle-realm.json:/opt/keycloak/data/import/feature-toggle-realm.json:ro
      - ./keycloak/themes/feature-toggle:/opt/keycloak/themes/feature-toggle:ro

  # ── Application ─────────────────────────────────────────────
  app:
    image: zaytsevdv/homni-feature-toggle:rc-1
    container_name: homni-feature-toggle
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: homni_feature_toggle
      DB_USER: homni
      DB_PASSWORD: homni
      OIDC_ISSUER_URI: http://keycloak:8180/realms/feature-toggle
      OIDC_ADMIN_EMAIL: admin@homni.local
      LOG_LEVEL: DEBUG
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

volumes:
  pgdata:
